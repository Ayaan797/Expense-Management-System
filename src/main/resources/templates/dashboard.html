<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" />
  <title>User Dashboard</title>
</head>
<body>

  <!-- ✅ User Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      
      <!-- Brand -->
      <a class="navbar-brand fw-bold text-white" th:href="@{/dashboard}">Expense Dashboard</a>

      <!-- User-specific links -->
      <div class="d-flex gap-2">
		<a class="btn btn-outline-light" th:href="@{/login}">Admin Panel</a>
        <a class="btn btn-outline-light" th:href="@{/reports}">Reports</a>
        <a class="btn btn-outline-light" th:href="@{/expenses/form}">+ Submit Expense</a>
      </div>

      <!-- Logout -->
      <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
    </div>
  </nav>

  <!-- ✅ User Expense Table -->
  <div class="container my-4">
    <h3>Your Expenses</h3>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- If no expenses -->
        <tr th:if="${#lists.isEmpty(expenses)}">
          <td colspan="4" class="text-center">No expenses submitted yet.</td>
        </tr>

        <!-- List all user's expenses -->
        <tr th:each="expense : ${expenses}">
          <td th:text="${#temporals.format(expense.date, 'yyyy-MM-dd HH:mm')}">2025-07-13 11:30</td>
          <td th:text="${expense.category}">Travel</td>
          <td th:text="'₹' + ${expense.amount}">₹200</td>
		  <td>
		    <span th:class="'badge ' + 
		                    (expense.status == 'APPROVED' ? 'bg-success' : 
		                     (expense.status == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark'))"
		          th:text="${expense.status}">
		    </span>
		  </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
