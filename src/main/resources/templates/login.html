<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Google Fonts (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Inline Styling -->
  <style>
	{
		box-sizing: border-box;
	}
    body {
      background: linear-gradient(to right, #86b7fe, #212529);
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      margin: 0;
	  padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background-color: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h2 {
      font-size: 2rem;
      color: #333;
	  text-align: center;
	  margin-bottom: 20px;
    }

    .form-group {
		margin-bottom: 20px;
	}

    .form-group label {
		display: block;
		margin-bottom: 6px;
		font-weight: 500;
	}

    .form-group input {
		width: 100%;
		padding: 12px;
		border: 1px solid #ccc;
		border-radius: 12px;
		font-size: 1rem;
	}
      .btn-login {
		width: 100%;
		background: linear-gradient(to right, #6c63ff, #48c6ef);
		color: white;
		padding: 12px;
		border: none;
		border-radius: 12px;
		font-size: 1rem;
		cursor: pointer;
		transition: 0.3s ease;
	  }
	  .btn-login:hover {
		opacity: 0.9;
	  }
	  .signup-link {
		text-align: center;
		margin-top: 15px;
		font-size: 0.9rem;
	  }
	  .signup-link a {
		color: #6c63ff;
		text-decoration: none;
		font-weight: 500;
	  }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2 class="text-center mb-4">Login</h2>

    <!-- ✅ Logout success message -->
    <div th:if="${param.logout}" class="alert alert-success">
      You have been logged out successfully.
    </div>

    <!-- ❌ Login error message -->
    <div th:if="${error}" class="alert alert-danger">
      Invalid email or password.
    </div>

    <form th:action="@{/login}" method="post" th:object="${resident}">
      <div class="mb-3">
        <label for="email" class="form-group">Email</label>
        <input th:field="*{email}" type="email" class="form-control" id="email" required />
      </div>

      <div class="mb-3">
        <label for="password" class="form-group">Password</label>
        <input th:field="*{password}" type="password" class="form-control" id="password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">Don't have an account? 
      <a th:href="@{/register}">Register here</a>
    </p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
