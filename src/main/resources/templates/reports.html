<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4 d-flex justify-content-between align-items-center flex-wrap">

    <!-- Brand -->
    <a class="navbar-brand fw-bold text-white" href="#">Expense Manager</a>

    <!-- Links based on role -->
    <div class="d-flex gap-2 my-2 my-lg-0">
      <!-- USER Dashboard link -->
      <a class="btn btn-outline-light"
        th:if="${role == 'USER'}"
         th:href="@{/dashboard}">Dashboard</a>

      <!-- ADMIN Dashboard link -->
      <a class="btn btn-outline-light"
 th:if="${role == 'ADMIN'}"
         th:href="@{/admin/panel}">Dashboard</a>

     
    </div>

    <!-- Logout button -->
    <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
  </div>
</nav>


<!-- Filters -->
<div class="container mt-4">
    <h2 class="mb-4">Expense Reports</h2>

    <form method="get" th:action="@{/reports}" class="row g-3">
        <div class="col-md-4">
            <label for="category" class="form-label">Category</label>
            <select name="category" class="form-select">
				<option value="">-- All Categories --</option>
				<option value="Travel">Travel</option>
				<option value="Food">Food</option>
				<option value="Supplies">Supplies</option>

                
            </select>
        </div>
        <div class="col-md-4">
            <label for="date" class="form-label">Date</label>
            <input type="date" name="date" class="form-control"/>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Filter</button>
        </div>
    </form>
</div>

<!-- Expense Table -->
<div class="container mt-4">
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Date & Time</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
			<tr th:each="expense : ${expenses}">
			    <td th:text="${expense.formattedDate}">Date</td>
			    <td th:text="${expense.category}">Category</td>
			    <td th:text="${expense.amount}">Amount</td>
				<td th:switch="${expense.status}">
				    <span th:case="'APPROVED'" class="badge bg-success" th:text="${expense.status}">APPROVED</span>
				    <span th:case="'REJECTED'" class="badge bg-danger" th:text="${expense.status}">REJECTED</span>
				    <span th:case="*" class="badge bg-warning text-dark" th:text="${expense.status}">PENDING</span>
				</td>


			</tr>
            <tr th:if="${#lists.isEmpty(expenses)}">
                <td colspan="4" class="text-center">No expenses found</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
