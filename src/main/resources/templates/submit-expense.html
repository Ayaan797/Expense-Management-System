<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit Expense</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Optional: Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Inline CSS for Styling & Responsiveness -->
  <style>
    body {
    
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .expense-container {
      background: transparent;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 600px;
      animation: fadeIn 0.7s ease-in-out;
    }

    h3 {
      font-weight: 600;
      color: #333;
      margin-bottom: 25px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-control:focus {
      box-shadow: 0 0 5px rgba(79, 172, 254, 0.8);
    }

    .btn-primary {
      background-color: #4facfe;
      border: none;
    }

    .btn-primary:hover {
      background-color: #00c6ff;
    }

    @media (max-width: 576px) {
      .expense-container {
        padding: 20px;
      }

      h3 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="expense-container">
    <h3 class="text-center">Submit New Expense</h3>

    <form th:action="@{/expenses/submit}"
          th:object="${expense}"
          method="post"
          enctype="multipart/form-data">

      <!-- ✅ Date & Time -->
      <div class="mb-3">
        <label class="form-label">Date & Time</label>
        <input type="datetime-local" class="form-control" th:field="*{date}" required>
      </div>

      <!-- ✅ Category -->
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" th:field="*{category}">
          <option value="Travel">Travel</option>
          <option value="Food">Food</option>
          <option value="Supplies">Supplies</option>
        </select>
      </div>

      <!-- ✅ Amount -->
      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" class="form-control" th:field="*{amount}" step="0.01" required>
      </div>

      <!-- ✅ Receipt Upload -->
      <div class="mb-3">
        <label class="form-label">Receipt Upload</label>
        <input type="file" class="form-control" name="receipt">
      </div>

      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>
  </div>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
