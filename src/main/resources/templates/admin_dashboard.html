<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <link rel="stylesheet" th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" />
  <title>Admin Dashboard</title>
</head>
<body>

  <!-- ✅ Admin Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      
      <!-- Brand -->
      <a class="navbar-brand fw-bold text-white" th:href="@{/admin/panel}">Expense Dashboard</a>

      <!-- Admin-specific links -->
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light active" th:href="@{/admin/panel}">Dashboard</a>
        <a class="btn btn-outline-light" th:href="@{/reports}">Reports</a>
      </div>

      <!-- Logout -->
      <a class="btn btn-outline-danger" th:href="@{/logout}">Logout</a>
    </div>
  </nav>

  <!-- ✅ Admin Expense Table -->
  <div class="container my-4">
    <h3>All Expenses - Admin Panel</h3>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>User Email</th>
          <th>Date</th>
          <th>Category</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="expense : ${expenses}">
          <td th:text="${expense.residentEmail}">email@example.com</td>
          <td th:text="${#temporals.format(expense.date, 'yyyy-MM-dd HH:mm')}">2025-07-13 12:00</td>
          <td th:text="${expense.category}">Travel</td>
          <td th:text="'₹' + ${expense.amount}">₹200</td>
          <td>
            <span class="badge"
                  th:classappend="${expense.status == 'APPROVED'} ? 'bg-success' :
                                 (expense.status == 'REJECTED') ? 'bg-danger' : 'bg-warning text-dark'"
                  th:text="${expense.status}">
            </span>
          </td>
          <td>
            <div th:if="${expense.status == 'PENDING'}" class="d-flex gap-2">
              <form th:action="@{'/admin/approve/' + ${expense.id}}" method="post">
                <button type="submit" class="btn btn-success btn-sm">Approve</button>
              </form>
              <form th:action="@{'/admin/reject/' + ${expense.id}}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Reject</button>
              </form>
            </div>
            <div th:unless="${expense.status == 'PENDING'}" class="text-muted">No actions</div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
